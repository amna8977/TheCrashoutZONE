<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crashout Zone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&family=Bitcount+Single+Ink:wght@100..900&family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            position: relative;
            font-family: 'Arvo', 'Chakra Petch';
            background-image: url('This is fine.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 84px 20px 20px;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(18, 18, 18, 0.5);
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            min-height: 56px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: rgba(22, 18, 16, 0.92);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
        }
        .nav-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 5px;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: #ffa200;
            color: #1f1608;
        }
        h1 {
            color: #222;
            margin-top: 0;
        }
        p {
            color: #444;
        }
        textarea {
            width: 100%;
            max-width: 600px;
            height: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #fff1e9;
            border-radius: 5px;
            resize: vertical;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ffa200;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc7a00;
        }
        .voice-btn {
            background-color: #db1313;
        }
        .voice-btn:hover {
            background-color: #b30000;
        }
        .message {
            margin-top: 20px;
            font-size: 18px;
            color: #666;
        }
        .counter {
            position: absolute;
            top: 76px;
            right: 20px;
            font-size: 14px;
            color: #ffffff;
            font-weight: 700;
        }
        .counter span {
            color: #ffffff;
        }
        @media (max-width: 520px) {
            body {
                padding-top: 136px;
            }
            .top-nav {
                align-items: flex-start;
                flex-direction: column;
            }
            .counter {
                top: 148px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-title">The Crashout Zone</div>
        <div class="nav-links">
            <a href="homepage.html">Home</a>
            <a href="Screamintoahole.html" class="active">Crashout</a>
            <a href="acknowledgements.html">A Very Special Thanks</a>
        </div>
    </nav>
    <div class="counter">Crashouts sent: <span id="screamCount">0</span></div>
    <div class="card">
        <h1>The Crashout Zone</h1>
        <p>Drop the chaos here. Type it or yell it, punch it, send it, and let the zone handle the rest.</p>
        <textarea id="screamText" placeholder="Type your crashout here..."></textarea>
        <div>
            <button id="screamBtn" onclick="scream()">Crash Out</button>
            <button onclick="startVoice()" id="voiceBtn" class="voice-btn" style="margin-left: 10px;">Voice Crashout</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        let screamCount = localStorage.getItem('screamCount') || 0;
        document.getElementById('screamCount').innerText = screamCount;

        // Speech Recognition setup
        let recognition;
        let recognitionActive = false;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
        } else if ('SpeechRecognition' in window) {
            recognition = new SpeechRecognition();
        } else {
            document.getElementById('voiceBtn').disabled = true;
            document.getElementById('voiceBtn').innerText = 'Voice Not Supported. Please Try Again';
        }

        if (recognition) {
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            recognition.onresult = function(event) {
                if (!recognitionActive) {
                    return;
                }
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('screamText').value = transcript;
            };
            recognition.onerror = function(event) {
                recognitionActive = false;
                if (event.error === 'aborted' || event.error === 'no-speech') {
                    document.getElementById('message').innerText = 'Voice recognition stopped.';
                    return;
                }
                alert('Voice recognition error: ' + event.error);
            };
            recognition.onend = function() {
                if (recognitionActive) {
                    recognitionActive = false;
                    document.getElementById('message').innerText = 'Voice recognition finished. Press Crash Out to send it.';
                }
            };
        }

        function startVoice() {
            if (recognition) {
                if (recognitionActive) {
                    document.getElementById('message').innerText = 'Already listening...';
                    return;
                }
                recognitionActive = true;
                document.getElementById('screamText').value = '';
                document.getElementById('message').innerText = 'Listening...';
                try {
                    recognition.start();
                } catch (error) {
                    recognitionActive = false;
                    document.getElementById('message').innerText = 'Could not start voice recognition. Please try again.';
                }
            }
        }

        function scream() {
            if (recognitionActive && recognition) {
                recognition.stop();
                recognitionActive = false;
                document.getElementById('message').innerText = 'Voice recognition stopped.';
            }
            const text = document.getElementById('screamText').value;
            if (text.trim() === '') {
                alert('Please type or speak something to start the crashout session!');
                return;
            }
            // Increment counter
            screamCount++;
            localStorage.setItem('screamCount', screamCount);
            document.getElementById('screamCount').innerText = screamCount;

            // Display message
            document.getElementById('message').innerText = 'Your crashout has been sent into the zone';
            document.getElementById('screamText').value = '';
        }
    </script>
</body>
</html>
